<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Читаем вместе</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Экран выбора уровня -->
  <div class="app-container" id="start-screen">
    <div class="start-content">
      <h1 class="start-title">Читаем вместе 👋</h1>
      <p class="start-subtitle">Выбери уровень сложности</p>
      <div class="level-buttons">
        <button class="level-btn level-easy" id="btn-easy">
          <span class="level-emoji">👶</span>
          <span class="level-label">Простой</span>
          <span class="level-desc">Слова по 3 буквы</span>
        </button>
        <button class="level-btn level-normal" id="btn-normal">
          <span class="level-emoji">🧒</span>
          <span class="level-label">Нормальный</span>
          <span class="level-desc">Все 50 уроков</span>
        </button>
        <button class="level-btn level-scientific" id="btn-scientific">
          <span class="level-emoji">👩‍🎓</span>
          <span class="level-label">Научный</span>
          <span class="level-desc">Генерируется из словаря</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Экран игры -->
  <div class="app-container hidden" id="game-container">
    <header>
      <div class="level-badge">
        <span>Уровень</span>
        <strong id="level-display">1</strong>
      </div>
      <div class="lives" id="lives-display">❤️❤️❤️</div>
      <button class="icon-btn" id="reset-btn" title="Начать заново">🔄</button>
    </header>

    <main id="game-screen" class="hidden">
      <div class="target-container">
        <h1 id="target-word" class="target-word">Загрузка...</h1>
        <p class="instruction">Найди правильную картинку</p>
      </div>

      <div class="images-grid" id="images-grid">
        <!-- Картинки генерируются JS -->
      </div>
    </main>

    <!-- Модалка обратной связи -->
    <div class="feedback-overlay hidden" id="feedback-overlay">
      <div class="feedback-modal">
        <div id="feedback-icon"></div>
        <p id="feedback-text"></p>
        <div class="parent-zone" id="parent-zone">
          <span class="parent-label">💡 Родителям:</span>
          <p id="parent-hint"></p>
        </div>
        <button class="next-btn" id="next-btn">Дальше 🚀</button>
      </div>
    </div>
  </div>

  <!-- Экран завершения -->
  <div class="modal hidden" id="end-modal">
    <div class="modal-content">
      <h2 id="end-title">🎉 Поздравляем!</h2>
      <p id="end-message">Курс пройден!</p>
      <button id="restart-btn">Начать заново</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
